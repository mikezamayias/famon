---
exclude_paths:
  - "test/**"
  - "packages/famon_core/test/**"
  # Codacy's analyzer cannot resolve `package:famon_core/...` imports
  # in NEWLY-ADDED files within a PR diff (the same false-positive
  # pattern that affected log_event_processor.dart in PR #101 and
  # item_array_parser.dart in PR #102). The local Dart analyzer +
  # `Analyze + format + test (famon_core)` CI both pass on this file.
  # Exclude the new pipeline until Codacy re-indexes it on a future
  # commit.
  - "lib/src/commands/shared/monitoring_pipeline.dart"
