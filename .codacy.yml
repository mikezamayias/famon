  # neighboring `monitor_command.dart` was modified by the same PR
  # and Codacy resolves *its* identical import without complaint.
  # Remove this exclusion after PR #103 merges and Codacy re-indexes
  # the file against `dev`.
  - "lib/src/cli/commands/filtered_monitor_command.dart"
