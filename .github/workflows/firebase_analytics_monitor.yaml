name: firebase_analytics_monitor

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/firebase_analytics_monitor.yaml"
      - "analysis_options.yaml"
      - "bin/**"
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "packages/famon_core/analysis_options.yaml"
      - "packages/famon_core/lib/**"
      - "packages/famon_core/test/**"
      - "packages/famon_core/pubspec.yaml"
      - "codecov.yml"

jobs:
  semantic-pull-request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/dart_package.yml@v1
    with:
      dart_sdk: "3.11.0"
      setup: "dart run build_runner build --delete-conflicting-outputs"
      min_coverage: 15  # Current baseline, target: 50%+ coverage

  build-core:
    name: Analyze + format + test (famon_core)
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/dart_package.yml@v1
    with:
      dart_sdk: "3.11.0"
      working_directory: packages/famon_core
      setup: "dart run build_runner build --delete-conflicting-outputs"
      min_coverage: 0  # famon_core has no tests yet; raise once coverage exists

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: |
        **/*.md
        !brick/**/*.md
        .*/**/*.md
      modified_files_only: false

  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.11.0"

      - name: 📦 Install Dependencies
        run: |
          dart pub get

      - name: 🔨 Generate Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔎 Verify version
        run: dart run test --run-skipped -t version-verify

  coverage:
    name: 📊 Upload Coverage
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.11.0"

      - name: 📦 Install Dependencies (root)
        run: dart pub get

      - name: 📦 Install Dependencies (famon_core)
        run: dart pub get
        working-directory: packages/famon_core

      - name: 🔨 Generate Code (root)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔨 Generate Code (famon_core)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: packages/famon_core

      - name: 🧪 Run Tests with Coverage (root)
        run: dart test --coverage=coverage

      - name: 🧪 Run Tests with Coverage (famon_core)
        run: dart test --coverage=coverage
        working-directory: packages/famon_core

      - name: 📊 Format Coverage
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info \
            --report-on=lib
          dart pub global run coverage:format_coverage \
            --lcov --in=packages/famon_core/coverage \
            --out=coverage/lcov-core.info \
            --report-on=lib

      - name: 📤 Upload CLI Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: cli
          fail_ci_if_error: false

      - name: 📤 Upload Core Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov-core.info
          flags: core
          fail_ci_if_error: false
