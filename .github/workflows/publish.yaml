name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: 📦 Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v4

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "stable"

      - name: 📦 Install Dependencies
        run: dart pub get

      - name: 🔢 Verify version consistency
        run: |
          # Extract version from tag (remove 'v' prefix)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          # Check pubspec.yaml
          PUBSPEC_VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match pubspec.yaml ($PUBSPEC_VERSION)"
            exit 1
          fi

          # Check lib/src/version.dart
          VERSION_DART=$(grep "const packageVersion" lib/src/version.dart | sed "s/.*= '\\([^']*\\)'.*/\\1/")
          if [ "$TAG_VERSION" != "$VERSION_DART" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match lib/src/version.dart ($VERSION_DART)"
            echo "Run: dart run tool/update_version.dart $TAG_VERSION"
            exit 1
          fi

          echo "Version consistency verified: $TAG_VERSION"

      - name: 🔍 Verify package
        run: dart pub publish --dry-run

      - name: 🚀 Publish to pub.dev
        run: dart pub publish --force
