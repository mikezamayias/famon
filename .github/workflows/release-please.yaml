name: release-please

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open or update release PR
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: dev
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-main:
    name: Fast-forward main to released dev
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Fast-forward main to dev
        env:
          DEV_REF: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "release-please[bot]"
          git config user.email "release-please[bot]@users.noreply.github.com"
          git fetch origin "$DEV_REF"
          git merge --ff-only "$DEV_REF"
          git push origin main
