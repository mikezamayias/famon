name: release-please

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open or update release PR
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: dev
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-main:
    name: Fast-forward main to released dev
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Fast-forward main, fall back to PR if main has diverged
        env:
          DEV_REF: ${{ needs.release-please.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "release-please[bot]"
          git config user.email "release-please[bot]@users.noreply.github.com"

          # Retry the fetch — release-please pushes the tag just before this
          # job starts and propagation to the runner's git remote is not
          # strictly synchronous.
          ATTEMPTS=0
          MAX_ATTEMPTS=6
          until git fetch origin "$DEV_REF"; do
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
              echo "::error::Could not fetch $DEV_REF after $MAX_ATTEMPTS attempts."
              exit 1
            fi
            echo "Fetch failed (attempt $ATTEMPTS/$MAX_ATTEMPTS), retrying in 5s..."
            sleep 5
          done

          # Try fast-forward. If main has diverged (hotfix on main, force-push,
          # branch-protection blocking direct pushes), fall back to opening a
          # PR so the divergence is surfaced and tracked instead of compounding
          # silently across releases.
          if git merge --ff-only "$DEV_REF" && git push origin main; then
            echo "main fast-forwarded to $DEV_REF."
            exit 0
          fi

          echo "::warning::main could not be fast-forwarded to $DEV_REF — opening sync PR."

          BRANCH="release-please/sync-main-${DEV_REF}"
          # Reset workspace to dev tip so the PR diff is exactly what main needs.
          git fetch origin dev
          git checkout -B "$BRANCH" "$DEV_REF"
          git push origin "$BRANCH" --force-with-lease

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: sync main to ${DEV_REF}" \
            --body "Auto-generated by release-please/sync-main because \`main\` could not fast-forward to \`${DEV_REF}\`. Either main has diverged (e.g. a direct hotfix) or branch protection blocked the direct push. Review the diff and merge to bring main back in line with the released code."
