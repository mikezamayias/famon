name: release-please

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open or update release PR
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          target-branch: dev
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  dispatch-publish:
    # release-please-action creates the v{version} tag using GITHUB_TOKEN.
    # Per GitHub Actions docs, tags created by GITHUB_TOKEN do NOT trigger
    # downstream workflows that listen on `push: tags` (a documented
    # anti-loop safeguard). The two known exceptions are workflow_dispatch
    # and repository_dispatch — so this job manually dispatches publish.yaml
    # via workflow_dispatch and waits for it to finish, propagating its
    # success or failure to the release-please workflow's own status.
    #
    # `--ref ${tag}` (not main) is intentional: the dispatched workflow
    # file is loaded from the tag itself, which is guaranteed to contain
    # the latest publish.yaml. This eliminates the race with sync-main
    # where main may not have caught up yet.
    #
    # release-please-action ALSO creates the GitHub Release directly, so
    # github-release.yaml is not dispatched from here. github-release.yaml
    # remains usable for manual `tool/release.sh` flows via push: tags.
    name: Dispatch publish.yaml and watch the run
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Dispatch publish.yaml
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run publish.yaml --ref "$TAG" -f tag="$TAG"
          echo "Dispatched publish.yaml for tag $TAG."
      - name: Wait for publish.yaml to finish
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Briefly let the dispatched run register on GitHub's side.
          sleep 10

          # Find the most recent workflow_dispatch run of publish.yaml.
          # Filter by both workflow file and event so we don't match an
          # unrelated push:tags run kicked off by tool/release.sh.
          for attempt in $(seq 1 6); do
            RUN_ID=$(gh run list \
              --workflow=publish.yaml \
              --event=workflow_dispatch \
              --limit 5 \
              --json databaseId,createdAt,status \
              --jq 'sort_by(.createdAt) | reverse | .[0].databaseId' || echo "")
            if [ -n "$RUN_ID" ]; then
              echo "Watching publish.yaml run $RUN_ID..."
              gh run watch "$RUN_ID" --exit-status
              exit 0
            fi
            echo "Dispatched run not yet visible (attempt $attempt/6); waiting 10s."
            sleep 10
          done

          echo "::error::Could not locate the dispatched publish.yaml run after 60s."
          exit 1

  sync-main:
    name: Fast-forward main to released dev
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Fast-forward main, fall back to PR if main has diverged
        env:
          DEV_REF: ${{ needs.release-please.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "release-please[bot]"
          git config user.email "release-please[bot]@users.noreply.github.com"

          # Retry the fetch — release-please pushes the tag just before this
          # job starts and propagation to the runner's git remote is not
          # strictly synchronous.
          ATTEMPTS=0
          MAX_ATTEMPTS=6
          until git fetch origin "$DEV_REF"; do
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
              echo "::error::Could not fetch $DEV_REF after $MAX_ATTEMPTS attempts."
              exit 1
            fi
            echo "Fetch failed (attempt $ATTEMPTS/$MAX_ATTEMPTS), retrying in 5s..."
            sleep 5
          done

          # Try fast-forward. If main has diverged (hotfix on main, force-push,
          # branch-protection blocking direct pushes), fall back to opening a
          # PR so the divergence is surfaced and tracked instead of compounding
          # silently across releases.
          if git merge --ff-only "$DEV_REF" && git push origin main; then
            echo "main fast-forwarded to $DEV_REF."
            exit 0
          fi

          echo "::warning::main could not be fast-forwarded to $DEV_REF — opening sync PR."

          BRANCH="release-please/sync-main-${DEV_REF}"
          # Reset workspace to dev tip so the PR diff is exactly what main needs.
          git fetch origin dev
          git checkout -B "$BRANCH" "$DEV_REF"
          git push origin "$BRANCH" --force-with-lease

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: sync main to ${DEV_REF}" \
            --body "Auto-generated by release-please/sync-main because \`main\` could not fast-forward to \`${DEV_REF}\`. Either main has diverged (e.g. a direct hotfix) or branch protection blocked the direct push. Review the diff and merge to bring main back in line with the released code."
