codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
        if_ci_failed: success
    patch:
      default:
        target: 0%
        if_ci_failed: success

ignore:
  - "**/*.g.dart"
  - "**/*.freezed.dart"
  - "**/*.module.dart"
  - "**/injection.config.dart"
  - "tool/**"
  - "example/**"
  - "test/**"
  - "packages/famon_core/test/**"

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:
    - component_id: famon-cli
      name: CLI
      paths:
        - lib/**
    - component_id: famon-core
      name: Core Library
      paths:
        - packages/famon_core/lib/**
