name: famon_core
description: Core library for Firebase Analytics event parsing, formatting, and persistence.
version: 1.3.0
repository: https://github.com/mikezamayias/famon

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  equatable: ^2.0.5
  get_it: ">=7.6.7 <10.0.0"
  injectable: ^2.3.5
  isar: ^3.1.0+1
  mason_logger: ">=0.2.11 <0.4.0"
  path: ^1.8.3
  process: ^5.0.2
  yaml: ^3.1.2

dev_dependencies:
  build_runner: ^2.4.9
  injectable_generator: ^2.1.6
  isar_generator: ^3.1.0+1
  lints: ">=3.0.0 <7.0.0"
  mocktail: ^1.0.3
  test: ^1.25.2
  very_good_analysis: ">=5.1.0 <11.0.0"
