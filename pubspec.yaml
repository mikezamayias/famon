name: famon
description: A command-line tool to monitor Firebase Analytics events from Android and iOS logs.
version: 1.4.1
repository: https://github.com/mikezamayias/famon
homepage: https://github.com/mikezamayias/famon
issue_tracker: https://github.com/mikezamayias/famon/issues
topics:
  - firebase
  - analytics
  - cli
  - monitoring

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  args: ^2.5.0
  cli_completion: ">=0.4.0 <0.6.0"
  equatable: ^2.0.5
  famon_core: ^1.4.1
  get_it: ">=7.6.7 <10.0.0"
  injectable: ^2.3.5
  mason_logger: ">=0.2.11 <0.4.0"
  path: ^1.8.3
  process: ^5.0.2
  pub_updater: ">=0.4.0 <0.6.0"
  yaml: ^3.1.2

dev_dependencies:
  build_runner: ^2.4.9
  build_verify: ^3.1.0
  injectable_generator: ^2.1.6
  lints: ">=3.0.0 <7.0.0"
  mocktail: ^1.0.3
  test: ^1.25.2
  very_good_analysis: ">=5.1.0 <11.0.0"

# Local-only override so the monorepo builds against the in-tree famon_core
# during development. pub.dev ignores dependency_overrides from consumers.
dependency_overrides:
  famon_core:
    path: packages/famon_core

executables:
  famon:
